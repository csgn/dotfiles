log_level = "warn"
position = "Bottom"

#[updates]
#check_cmd = "checkupdates; paru -Qua"
#update_cmd = 'alacritty -e bash -c "paru; echo Done - Press enter to exit; read" &'
#interval = 3600

[modules]
left = [ [ "AppLauncher", "Workspaces", "WindowTitle" ] ]
center = [ "Tempo"  ]
right = [ "Tray", "SystemInfo", ["KeyboardLayout", "Settings", "Privacy"] ]

[keyboard_layout.labels]
"English (US)" = "US"
"Turkish" = "TR"

[workspaces]
visibility_mode = "All"
group_by_monitor = false
enable_workspace_filling = true
max_workspaces = 4

[window_title]
mode = "Title"
truncate_title_after_length = 30

[system_info]
indicators = [ "Cpu", "Memory", "Temperature" ]
interval = 5

[system_info.cpu]
warn_threshold = 60
alert_threshold = 80

[system_info.memory]
warn_threshold = 70
alert_threshold = 85

[system_info.temperature]
warn_threshold = 60
alert_threshold = 80
sensor = "acpitz temp1"

[tempo]
clock_format = "%a %d %b %I:%M %p"
formats = [ 
    "%a %d %b %I:%M %p", 
    "%Y-%m-%d %I:%M:%S %p", 
    "%I:%M:%S %p" 
]
timezones = [ "Europe/Istanbul" ]
#weather_location = { City = "Istanbul" }
weather_location = "Current"
weather_indicator = "IconAndTemperature"

[settings]
audio_indicator_format = "IconAndPercentage"
microphone_indicator_format = "IconAndPercentage"
network_indicator_format = "IconAndPercentage"
brightness_indicator_format = "IconAndPercentage"
logout_cmd = "command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit"


[appearance]
scale_factor = 1.5
primary_color = "#222222"
success_color = "#14ff7e"
text_color = "#ffffff"
workspace_colors = [ "#ffffff", "#0052cc" ]

[appearance.danger_color]
base = "#f7768e"
weak = "#e0af68"

[appearance.background_color]
base = "#111111"
weak = "#000000"
strong = "#222222"

[appearance.secondary_color]
base = "#000000"

[[CustomModule]]
name = "AppLauncher"
icon = "󱗼"
command = "rofi -show drun"
